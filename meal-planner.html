<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Meal Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Instrument Sans', sans-serif; background: #f5f1ea; color: #2c2518; -webkit-font-smoothing: antialiased; }
.container { max-width: 480px; margin: 0 auto; padding: 0 16px; }
.header { padding: 32px 0 24px; }
.header-row { display: flex; align-items: center; justify-content: space-between; }
.week-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #8a8578; }
.week-num { font-size: 28px; font-weight: 700; color: #2c2518; margin-top: 2px; }
.badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-pending { background: #f2cc8f30; color: #b8942e; }
.badge-confirmed { background: #81b29a20; color: #4a7c5e; }
.stats { display: flex; gap: 24px; margin-top: 16px; font-size: 13px; color: #8a8578; }
.stats strong { color: #3d3830; font-weight: 600; }
.hint { background: #f7f4ee; border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #6b6358; display: flex; align-items: center; gap: 10px; }
.hint strong { color: #2c2518; }
.card { background: #fffcf7; border-radius: 16px; border: 1px solid #e8e2d8; overflow: hidden; margin-bottom: 12px; transition: all 0.3s ease; }
.card.swapping { opacity: 0.4; transform: scale(0.97); }
.card-header { padding: 20px 24px; display: flex; align-items: flex-start; gap: 16px; cursor: pointer; }
.card-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; margin-top: 2px; }
.card-body { flex: 1; min-width: 0; }
.card-cuisine { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 4px; }
.card-title { font-size: 17px; font-weight: 600; color: #2c2518; line-height: 1.3; }
.macros { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
.macro { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.macro-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.macro-label { color: #8a8578; }
.macro-value { font-weight: 600; color: #3d3830; }
.card-meta { display: flex; gap: 12px; margin-top: 8px; font-size: 13px; color: #8a8578; }
.card-arrow { font-size: 18px; color: #c4b9a8; flex-shrink: 0; margin-top: 4px; transition: transform 0.2s; }
.card-arrow.open { transform: rotate(180deg); }
.card-details { padding: 0 24px 20px; border-top: 1px solid #f0ebe2; }
.section-title { font-size: 13px; font-weight: 600; color: #5c5548; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.8px; padding-top: 16px; }
.ingredients-grid { display: grid; grid-template-columns: 1fr; gap: 4px; }
.ingredient-row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 8px; border-radius: 6px; gap: 6px; }
.ingredient-row:nth-child(even) { background: rgba(0,0,0,0.02); }
.ingredient-name { font-size: 13px; color: #3d3830; line-height: 1.3; }
.ingredient-qty { font-size: 12px; color: #8a8578; white-space: nowrap; flex-shrink: 0; }
.step { display: flex; gap: 10px; margin-bottom: 6px; }
.step-num { font-size: 12px; font-weight: 700; min-width: 18px; }
.step-text { font-size: 13px; color: #5c5548; line-height: 1.5; }
.btn-swap { width: 100%; padding: 10px 0; background: transparent; border: 1px dashed #d4cdc0; border-radius: 10px; color: #8a8578; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; margin: 0 24px 16px; width: calc(100% - 48px); }
.btn-swap:hover { border-color: var(--accent); color: var(--accent); }
.btn-confirm { width: 100%; margin-top: 20px; padding: 16px 0; background: #2c2518; color: #fffcf7; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(44,37,24,0.15); font-family: inherit; }
.btn-confirm:hover { background: #3d3830; }
.btn-toggle { width: 100%; margin: 16px 0 32px; padding: 12px 0; background: transparent; border: 1px solid #e8e2d8; border-radius: 12px; color: #5c5548; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
.list-header { background: #2c2518; border-radius: 16px; padding: 20px 24px; margin: 24px 0 20px; display: flex; align-items: center; justify-content: space-between; }
.list-header-title { color: #f2cc8f; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; }
.list-header-name { color: #fffcf7; font-size: 20px; font-weight: 600; margin-top: 4px; }
.list-header-count { color: #8a8578; font-size: 13px; }
.pasillo { margin-bottom: 16px; }
.pasillo-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.pasillo-dot { width: 10px; height: 10px; border-radius: 50%; }
.pasillo-name { font-size: 14px; font-weight: 600; color: #3d3830; }
.pasillo-count { font-size: 12px; color: #8a8578; }
.list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 8px; }
.list-item:nth-child(even) { background: #fffcf7; }
.list-item-name { font-size: 14px; color: #3d3830; }
.list-item-qty { font-size: 13px; color: #8a8578; white-space: nowrap; margin-left: 12px; }
.list-item-format { color: #c4b9a8; margin-left: 6px; font-size: 12px; }
.loading { text-align: center; padding: 60px 0; color: #8a8578; font-size: 15px; }
.error { text-align: center; padding: 40px 20px; color: #e07a5f; font-size: 14px; background: #fffcf7; border-radius: 16px; border: 1px solid #e8e2d8; }
.error button { margin-top: 12px; padding: 8px 20px; background: #2c2518; color: #fffcf7; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
// ============ CONFIGURACIÓN ============
// Cambia esto a la URL de producción cuando actives el workflow:
const API_BASE = 'https://n8n.jcarrillo.eu/webhook';
// Producción: const API_BASE = 'https://n8n.jcarrillo.eu/webhook';
// ========================================

const ICONS = ['🐚', '🍳', '🦐', '🥗', '🐟', '🍗', '🥩', '🥚', '🌮', '🐙'];
const COLORS = ['#e07a5f', '#81b29a', '#f2cc8f'];
const PASILLO_COLORS = {
  'Pescadería': '#3d85c6', 'Fruta y verdura': '#6aa84f', 'Frutería': '#6aa84f',
  'Congelados': '#76a5af', 'Charcutería': '#cc4125', 'Huevos': '#f1c232',
  'Huevos y lácteos': '#f1c232', 'Panadería': '#e69138', 'Aceites': '#a4c2f4',
  'Aceites y vinagres': '#a4c2f4', 'Bodega': '#8e7cc3', 'Lácteos': '#d5a6bd',
  'Lácteos y Refrigerados': '#d5a6bd', 'Refrigerados': '#d5a6bd',
  'Pasta': '#ffd966', 'Salsas': '#b45f06', 'Salsas y Conservas': '#b45f06',
  'Conservas': '#bf9000', 'Especias': '#999', 'Especias y condimentos': '#999',
  'Especias/Condimentos': '#999', 'Carnicería/Refrigerados': '#cc4125',
  'Carnicería y Refrigerados': '#cc4125', 'Repostería/Productos secos': '#c9a96e',
  'Panadería/Productos secos': '#e69138', 'Pescadería / Refrigerados': '#3d85c6',
  'Fruta y Verdura': '#6aa84f', 'Legumbres, Arroces y Pasta': '#d9d2e9',
  'Arroces y legumbres': '#d9d2e9',
};

let state = {
  loading: true,
  error: null,
  semana: '',
  estado: 'propuesta',
  recetas: [],
  confirmed: false,
  showList: false,
  expanded: null,
  swapping: null,
};

async function fetchMenu() {
  state.loading = true;
  state.error = null;
  render();
  try {
    const resp = await fetch(API_BASE + '/menu-actual');
    if (!resp.ok) throw new Error('Error ' + resp.status);
    const data = await resp.json();
    state.semana = data.semana || '';
    state.estado = data.estado || 'propuesta';
    state.confirmed = data.estado === 'confirmado';
    state.recetas = data.recetas || [];
    state.loading = false;
  } catch (e) {
    state.error = e.message;
    state.loading = false;
  }
  render();
}

async function swapRecipe(index) {
  state.swapping = index;
  render();
  try {
    const excluirIds = state.recetas.map(r => r.id);
    const resp = await fetch(API_BASE + '/cambiar-receta', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ posicion: index, excluir_ids: excluirIds }),
    });
    const data = await resp.json();
    if (data.receta) {
      state.recetas[index] = data.receta;
    }
  } catch (e) {
    console.error('Error al cambiar receta:', e);
  }
  state.swapping = null;
  render();
}

async function confirmMenu() {
  try {
    await fetch(API_BASE + '/confirmar-menu', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        semana: state.semana,
        receta_1_id: state.recetas[0] ? state.recetas[0].id : '',
        receta_2_id: state.recetas[1] ? state.recetas[1].id : '',
        receta_3_id: state.recetas[2] ? state.recetas[2].id : '',
      }),
    });
  } catch (e) {
    console.error('Error al confirmar:', e);
  }
  state.confirmed = true;
  state.estado = 'confirmado';
  state.showList = true;
  render();
}

function toggleExpand(i) {
  state.expanded = state.expanded === i ? null : i;
  render();
}

function toggleList() {
  state.showList = !state.showList;
  render();
}

function buildShoppingList() {
  const grouped = {};
  state.recetas.forEach(r => {
    const ings = typeof r.ingredientes_mercadona === 'string'
      ? JSON.parse(r.ingredientes_mercadona)
      : (r.ingredientes_mercadona || []);
    ings.forEach(ing => {
      const key = ing.pasillo || 'Otros';
      if (!grouped[key]) grouped[key] = [];
      const existing = grouped[key].find(e => e.ingrediente === ing.ingrediente);
      if (existing && typeof existing.cantidad_necesaria === 'number' && typeof ing.cantidad_necesaria === 'number') {
        existing.cantidad_necesaria += ing.cantidad_necesaria;
      } else if (!existing) {
        grouped[key].push({ ...ing });
      }
    });
  });
  return grouped;
}

function render() {
  const app = document.getElementById('app');
  if (state.loading) {
    app.innerHTML = '<div class="loading">Cargando tu menu semanal...</div>';
    return;
  }
  if (state.error) {
    app.innerHTML = '<div class="error">No se pudo cargar el menu: ' + state.error + '<br><button onclick="fetchMenu()">Reintentar</button></div>';
    return;
  }

  const totalKcal = state.recetas.length > 0
    ? Math.round(state.recetas.reduce((a, r) => a + (r.kcal_porcion || 0), 0) / state.recetas.length)
    : 0;

  let html = '';

  // Header
  html += '<div class="header"><div class="header-row"><div>';
  html += '<div class="week-label">Semana</div>';
  html += '<div class="week-num">' + state.semana + '</div>';
  html += '</div>';
  html += '<div class="badge ' + (state.confirmed ? 'badge-confirmed' : 'badge-pending') + '">';
  html += state.confirmed ? '✓ Confirmado' : 'Pendiente';
  html += '</div></div>';
  html += '<div class="stats">';
  html += '<div><strong>3</strong> recetas</div>';
  html += '<div><strong>12</strong> comidas</div>';
  html += '<div>Media <strong>' + totalKcal + '</strong> kcal</div>';
  html += '</div></div>';

  // Hint
  html += '<div class="hint"><span style="font-size:16px">📅</span><span>Haz el pedido en Mercadona el <strong>domingo</strong> para recibirlo el <strong>lunes por la mañana</strong></span></div>';

  // Recipe cards
  state.recetas.forEach((r, i) => {
    const accent = COLORS[i % 3];
    const icon = ICONS[i % ICONS.length];
    const isExpanded = state.expanded === i;
    const isSwapping = state.swapping === i;
    const ings = typeof r.ingredientes_mercadona === 'string'
      ? JSON.parse(r.ingredientes_mercadona)
      : (r.ingredientes_mercadona || []);
    const pasos = typeof r.pasos === 'string'
      ? r.pasos.split('\n').filter(p => p.trim())
      : (r.pasos || []);

    html += '<div class="card' + (isSwapping ? ' swapping' : '') + '">';

    // Card header
    html += '<div class="card-header" onclick="toggleExpand(' + i + ')">';
    html += '<div class="card-icon" style="background:' + accent + '20">' + icon + '</div>';
    html += '<div class="card-body">';
    html += '<div class="card-cuisine" style="color:' + accent + '">' + (r.tipo_cocina || '') + ' · ' + (r.proteina_principal || '') + '</div>';
    html += '<div class="card-title">' + (r.nombre || '') + '</div>';
    html += '<div class="macros">';
    html += '<div class="macro"><div class="macro-dot" style="background:' + accent + '"></div><span class="macro-value">' + (r.kcal_porcion || 0) + ' kcal</span></div>';
    html += '<div class="macro"><div class="macro-dot" style="background:#81b29a"></div><span class="macro-label">P</span><span class="macro-value">' + (r.proteina_g || 0) + 'g</span></div>';
    html += '<div class="macro"><div class="macro-dot" style="background:#f2cc8f"></div><span class="macro-label">C</span><span class="macro-value">' + (r.carbos_g || 0) + 'g</span></div>';
    html += '<div class="macro"><div class="macro-dot" style="background:#e07a5f"></div><span class="macro-label">G</span><span class="macro-value">' + (r.grasa_g || 0) + 'g</span></div>';
    html += '</div>';
    html += '<div class="card-meta"><span>⏱ ' + (r.tiempo_min || 0) + ' min</span><span>·</span><span>4 raciones</span></div>';
    html += '</div>';
    html += '<div class="card-arrow' + (isExpanded ? ' open' : '') + '">▾</div>';
    html += '</div>';

    // Expanded details
    if (isExpanded) {
      html += '<div class="card-details">';

      // Ingredients
      html += '<div class="section-title">Ingredientes</div>';
      html += '<div class="ingredients-grid">';
      ings.forEach((ing, j) => {
        html += '<div class="ingredient-row">';
        html += '<span class="ingredient-name">' + ing.ingrediente + '</span>';
        html += '<span class="ingredient-qty">' + ing.cantidad_necesaria + ' ' + (ing.unidad || '') + '</span>';
        html += '</div>';
      });
      html += '</div>';

      // Steps
      html += '<div class="section-title" style="padding-top:16px">Pasos</div>';
      pasos.forEach((p, j) => {
        html += '<div class="step">';
        html += '<span class="step-num" style="color:' + accent + '">' + (j + 1) + '.</span>';
        html += '<span class="step-text">' + p + '</span>';
        html += '</div>';
      });

      html += '</div>';
    }

    // Swap button
    if (!state.confirmed) {
      html += '<div style="padding:0 24px 16px"><button class="btn-swap" style="--accent:' + accent + ';width:100%" onclick="event.stopPropagation();swapRecipe(' + i + ')">↻ Cambiar receta</button></div>';
    }

    html += '</div>';
  });

  // Confirm button
  if (!state.confirmed) {
    html += '<button class="btn-confirm" onclick="confirmMenu()">Confirmar menu y generar lista de compra</button>';
  }

  // Shopping list
  if (state.showList) {
    const grouped = buildShoppingList();
    const pasillos = Object.keys(grouped).sort();
    const totalProducts = pasillos.reduce((a, p) => a + grouped[p].length, 0);

    html += '<div class="list-header"><div>';
    html += '<div class="list-header-title">Lista de la compra</div>';
    html += '<div class="list-header-name">Mercadona</div>';
    html += '</div>';
    html += '<div class="list-header-count">' + totalProducts + ' productos · ' + pasillos.length + ' pasillos</div>';
    html += '</div>';

    pasillos.forEach(pasillo => {
      const color = PASILLO_COLORS[pasillo] || '#8a8578';
      html += '<div class="pasillo">';
      html += '<div class="pasillo-header">';
      html += '<div class="pasillo-dot" style="background:' + color + '"></div>';
      html += '<span class="pasillo-name">' + pasillo + '</span>';
      html += '<span class="pasillo-count">(' + grouped[pasillo].length + ')</span>';
      html += '</div>';
      grouped[pasillo].forEach((ing, j) => {
        html += '<div class="list-item">';
        html += '<span class="list-item-name">' + ing.ingrediente + '</span>';
        html += '<span class="list-item-qty">' + ing.cantidad_necesaria + ' ' + (ing.unidad || '');
        html += '<span class="list-item-format">(' + (ing.presentacion || '') + ')</span>';
        html += '</span></div>';
      });
      html += '</div>';
    });
  }

  // Toggle list button
  if (state.confirmed) {
    html += '<button class="btn-toggle" onclick="toggleList()">' + (state.showList ? 'Ocultar lista de compra' : 'Ver lista de compra') + '</button>';
  }

  app.innerHTML = html;
}

// Init
fetchMenu();
</script>
</body>
</html>
